<div class="hero min-h-screen bg-base-200">
    <div class="hero-content w-full">
        <div class="card flex-shrink-0 w-full max-w-md shadow-2xl bg-base-100">
            <div class="card-body gap-5">
                <div class="card-title text-center justify-center items-center hidden md:flex"><a href="/">{% include "partials/logo.html" %}</a></div>
                <div class="card-title text-center justify-center items-center md:hidden">{% include "partials/logo.html" %}</div>
                <div class="card-title justify-center items-center">SIGN UP</div>
                <form hx-post="/api/signup" hx-target="#error-message">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Email</span>
                    </label>
                    <input type="email" name="email" placeholder="email" class="input input-bordered" />
                </div>
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Password</span>
                    </label>
                    <input type="password" name="password" placeholder="password" class="input input-bordered" />
                    <label class="label">
                        <a href="#" class="label-text-alt link link-hover">Forgot password?</a>
                    </label>
                </div>
                <div class="form-control mt-5">
                    <button class="btn btn-primary" type="submit">Sign Up</button>
                </div>
                </form>
                <div id="error-message" class="text-center text-error font-bold text-lg"></div>
            </div>
        </div>
    </div>
</div>
